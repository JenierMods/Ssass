services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ssass
      POSTGRES_USER: ssass
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssass -d ssass"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    image: php:8.3-cli
    working_dir: /var/www/apps/api
    volumes:
      - .:/var/www
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan serve --host=0.0.0.0 --port=8000
    profiles: ["app"]

  web:
    image: node:22-alpine
    working_dir: /workspace/apps/web
    volumes:
      - .:/workspace
    ports:
      - "3000:3000"
    command: npm run dev
    profiles: ["app"]

volumes:
  postgres-data:
  redis-data:
